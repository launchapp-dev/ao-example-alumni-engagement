mcp_servers:
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "."
    description: "Read/write alumni profiles, segments, scores, outreach templates, and reports"

  memory:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-memory"
    description: "Persist alumni segment assignments, engagement history snapshots, and cross-run context"

  sqlite:
    command: npx
    args:
      - "-y"
      - "@berthojoris/mcp-sqlite-server"
    env:
      DB_PATH: "./data/alumni.db"
    description: "SQLite database for alumni records, activity logs, and engagement history"

  sequential-thinking:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-sequential-thinking"
    description: "Structured reasoning for complex donor tiering and edge case analysis"
